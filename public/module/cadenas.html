<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramscape — Cadenas</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:transparent;color:#eceef1;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:330px;margin:0 auto;padding:10px;text-align:center}
  .title{font-size:.78rem;color:#aab0b8;letter-spacing:1px;margin-bottom:14px}
  .dials{display:flex;gap:8px;justify-content:center}
  .dial{width:54px;background:#23262b;border:1px solid #565b63;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;padding:6px 0;user-select:none}
  .arrow{width:30px;height:26px;display:flex;align-items:center;justify-content:center;
    color:#9aa0a8;font-size:1.1rem;cursor:pointer;border-radius:6px}
  .arrow:active{background:#3a3e45;transform:scale(.9)}
  .val{font-family:'Courier New',monospace;font-size:1.8rem;font-weight:700;color:#eceef1;
    height:46px;display:flex;align-items:center;justify-content:center;width:100%;
    border-top:1px solid #3a3e45;border-bottom:1px solid #3a3e45;overflow:hidden}
  .val span{display:block;animation:roll .18s ease}
  @keyframes roll{from{transform:translateY(-40%);opacity:.3}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="title" id="title">Trouvez la combinaison</div>
  <div class="dials" id="dials"></div>
</div>

<script>
const P = new URLSearchParams(location.search);
const N = Math.max(1, Math.min(8, parseInt(P.get('molettes')||P.get('n')||'4',10)));
const MODE = (P.get('mode')||'chiffres').toLowerCase(); // 'chiffres' ou 'lettres'
const TITLE = P.get('title');
if (TITLE) document.getElementById('title').textContent = TITLE;

const SET = MODE==='lettres' ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('') : '0123456789'.split('');
let pos = new Array(N).fill(0);

function render(){
  const el = document.getElementById('dials');
  el.innerHTML = pos.map((p,i)=>`
    <div class="dial">
      <div class="arrow" onclick="bump(${i},1)">▲</div>
      <div class="val"><span id="v${i}">${SET[p]}</span></div>
      <div class="arrow" onclick="bump(${i},-1)">▼</div>
    </div>`).join('');
}
window.bump = function(i, dir){
  pos[i] = (pos[i] + dir + SET.length) % SET.length;
  const v = document.getElementById('v'+i);
  v.textContent = SET[pos[i]];
  v.style.animation='none'; void v.offsetWidth; v.style.animation='roll .18s ease';
};
render();
</script>
</body>
</html>
