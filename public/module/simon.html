<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramscape — Simon</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{background:transparent;color:#eceef1;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:300px;margin:0 auto;padding:12px;text-align:center}
  .title{font-size:.78rem;color:#aab0b8;letter-spacing:1px;margin-bottom:8px}
  .level{font-size:.72rem;color:#9ad0c0;margin-bottom:12px;letter-spacing:1px}
  .pad{display:grid;gap:10px;width:270px;margin:0 auto 14px;transition:opacity .2s}
  .btnc{border-radius:14px;cursor:pointer;opacity:.55;transition:opacity .1s,transform .1s;border:2px solid rgba(255,255,255,.15)}
  .btnc.lit{opacity:1;transform:scale(.97)}
  .row{display:flex;gap:8px;justify-content:center}
  .btn{background:#2f6f5e;color:#eceef1;border:1px solid #3c8b76;border-radius:9px;padding:9px 16px;font-size:.82rem;cursor:pointer}
  .btn:active{transform:scale(.95)}
  .status{font-size:.85rem;font-weight:700;margin-top:12px;min-height:24px}
  .ok{color:#22d27a}.ko{color:#e2787f}
  .reveal{font-size:1.4rem;font-weight:800;letter-spacing:2px;color:#9ad0c0;background:#23262b;
    border:1px dashed #6fb7a3;border-radius:10px;padding:14px;margin-top:8px}
  .reveal-img{max-width:100%;border-radius:10px;margin-top:8px}
</style></head><body>
<div class="wrap">
  <div class="title" id="title">Mémorisez et reproduisez la séquence</div>
  <div class="level" id="level"></div>
  <div class="pad" id="pad"></div>
  <div class="row"><button class="btn" id="start">▶ Voir la séquence</button></div>
  <div class="status" id="status"></div>
  <div id="reveal-zone"></div>
</div>
<script>
const P=new URLSearchParams(location.search);
const COLORS=['#4caf6e','#d9534f','#e0b94d','#4d8fd9','#9b59b6','#e67e22','#1abc9c','#e84393'];
const FREQS =[261.63,293.66,329.63,392.00,440.00,493.88,523.25,587.33];
const GRID={4:[2,2],6:[3,2],8:[4,2]}; // [colonnes, lignes]

// Niveaux au format  niveauX = NB:seq   (ex: niveau1=4:0,2,1,3)
// Compat : "niveauX=0,2,1" sans NB => 4 boutons. "sequence=" => 1 niveau 4 boutons.
function parseLevel(v){
  let nb=4, seqStr=v;
  if(v.includes(':')){ const [n,rest]=v.split(':'); nb=parseInt(n,10); seqStr=rest; }
  if(![4,6,8].includes(nb)) nb=4;
  const seq=seqStr.split(',').map(s=>parseInt(s,10)).filter(n=>n>=0&&n<nb);
  return {nb, seq};
}
let LEVELS=[];
for(let i=1;i<=20;i++){
  const v=P.get('niveau'+i)||P.get('level'+i);
  if(v) LEVELS.push(parseLevel(v));
}
if(!LEVELS.length){
  const single=P.get('sequence')||'0,2,1,3';
  const nbDefault=parseInt(P.get('boutons')||'4',10);
  LEVELS=[parseLevel((([4,6,8].includes(nbDefault))?nbDefault:4)+':'+single)];
}
const REVEAL=P.get('reveal'),IMAGE=P.get('image'),VALIDATE=P.get('validate')==='1';
const TITLE=P.get('title'); if(TITLE)document.getElementById('title').textContent=TITLE;

let lvl=0, input=[], playing=false;
function curNb(){ return LEVELS[lvl].nb; }
function curSeq(){ return LEVELS[lvl].seq; }
function showLevel(){ document.getElementById('level').textContent='Niveau '+(lvl+1)+' / '+LEVELS.length+'  ·  '+curNb()+' boutons'; }

let ac=null;function audio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function tone(i,dur){const a=audio();const o=a.createOscillator(),g=a.createGain();o.frequency.value=FREQS[i];o.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(0.4,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);o.start();o.stop(a.currentTime+dur+0.02);}
function lite(i){const e=document.querySelector('.btnc[data-i="'+i+'"]');if(e){e.classList.add('lit');setTimeout(()=>e.classList.remove('lit'),300);}}

// (Re)dessine le pad pour le niveau courant
function buildPad(){
  const nb=curNb(); const [cols]=GRID[nb];
  const pad=document.getElementById('pad');
  pad.style.gridTemplateColumns='repeat('+cols+',1fr)';
  const cellH = nb===4?110:(nb===6?86:74);
  let html='';
  for(let i=0;i<nb;i++){ html+=`<div class="btnc" data-i="${i}" style="background:${COLORS[i]};height:${cellH}px" onclick="tap(${i})"></div>`; }
  pad.style.opacity=0;
  pad.innerHTML=html;
  setTimeout(()=>{ pad.style.opacity=1; }, 60);
}
function playSeq(){
  const a=audio(); if(a.state==='suspended')a.resume();
  playing=true; input=[]; document.getElementById('status').textContent='Observez...';
  const seq=curSeq(); let t=0;
  seq.forEach(c=>{ setTimeout(()=>{ lite(c); tone(c,0.35); }, t); t+=520; });
  setTimeout(()=>{ playing=false; document.getElementById('status').textContent='À vous !'; }, t);
}
window.tap=function(i){
  if(playing) return;
  const a=audio(); if(a.state==='suspended')a.resume();
  lite(i); tone(i,0.3); input.push(i);
  const seq=curSeq(); const k=input.length-1;
  if(input[k]!==seq[k]){ fail(); return; }
  if(input.length===seq.length){ levelDone(); }
};
function fail(){
  const st=document.getElementById('status'); st.className='status ko';
  st.textContent='✗ Erreur ! On reprend au niveau 1.';
  lvl=0; input=[]; showLevel(); buildPad();
}
function levelDone(){
  input=[];
  if(lvl<LEVELS.length-1){
    lvl++; showLevel(); buildPad();
    const st=document.getElementById('status'); st.className='status ok'; st.textContent='✓ Niveau réussi ! Suivant...';
    setTimeout(playSeq,1000);
  } else { success(); }
}
function success(){
  const st=document.getElementById('status'),zone=document.getElementById('reveal-zone');
  st.className='status ok'; st.textContent='✓ Tous les niveaux réussis !';
  if(IMAGE){const g=document.createElement('img');g.src=IMAGE;g.className='reveal-img';zone.appendChild(g);}
  else if(REVEAL){const d=document.createElement('div');d.className='reveal';d.textContent=REVEAL;zone.appendChild(d);}
  if(VALIDATE){try{window.parent.postMessage({type:'ramscape:solved',module:'simon'},'*');}catch(e){}}
}
document.getElementById('start').onclick=()=>{ if(!playing) playSeq(); };
showLevel(); buildPad();
</script></body></html>
