<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramscape — Interrupteurs</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{background:transparent;color:#eceef1;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:330px;margin:0 auto;padding:12px;text-align:center}
  .title{font-size:.78rem;color:#aab0b8;letter-spacing:1px;margin-bottom:14px}
  .grid{display:grid;gap:10px;justify-content:center;margin:0 auto 14px}
  .cell{border-radius:12px;cursor:pointer;border:2px solid #565b63;background:#23262b;
    display:flex;align-items:center;justify-content:center;transition:background .15s,transform .08s;position:relative}
  .cell:active{transform:scale(.94)}
  .cell.on{background:#2f6f5e;border-color:#6fb7a3;box-shadow:inset 0 0 14px rgba(111,183,163,.5)}
  .bulb{font-size:1.5rem;opacity:.35}
  .cell.on .bulb{opacity:1}
  .goal{font-size:.7rem;color:#8a909a;margin-bottom:10px}
  .status{font-size:.85rem;font-weight:700;margin-top:6px;min-height:24px}
  .ok{color:#22d27a}
  .reveal{font-size:1.4rem;font-weight:800;letter-spacing:2px;color:#9ad0c0;background:#23262b;
    border:1px dashed #6fb7a3;border-radius:10px;padding:14px;margin-top:8px}
  .reveal-img{max-width:100%;border-radius:10px;margin-top:8px}
  .row{display:flex;gap:8px;justify-content:center;margin-top:8px}
  .btn{background:#3a3e45;color:#eceef1;border:1px solid #565b63;border-radius:9px;padding:8px 14px;font-size:.78rem;cursor:pointer}
  .btn:active{transform:scale(.95)}
</style></head><body>
<div class="wrap">
  <div class="title" id="title">Éteignez tous les voyants</div>
  <div class="goal" id="goal"></div>
  <div class="grid" id="grid"></div>
  <div class="row"><button class="btn" id="reset">↺ Réinitialiser</button></div>
  <div class="status" id="status"></div>
  <div id="reveal-zone"></div>
</div>
<script>
const P=new URLSearchParams(location.search);
const COLS=Math.max(2,Math.min(5,parseInt(P.get('colonnes')||P.get('cols')||'3',10)));
const ROWS=Math.max(2,Math.min(5,parseInt(P.get('lignes')||P.get('rows')||'3',10)));
const TOTAL=COLS*ROWS;
// État de départ : chaîne de 0/1 (1=allumé), longueur COLS*ROWS. Aléatoire-solvable si absent.
let START=(P.get('depart')||P.get('start')||'').replace(/[^01]/g,'');
// Objectif : 'eteint' (défaut), 'allume', ou une cible binaire precise via cible=...
const GOALMODE=(P.get('objectif')||P.get('goal')||'eteint').toLowerCase();
let TARGET;
const CIBLE=(P.get('cible')||'').replace(/[^01]/g,'');
if(CIBLE.length===TOTAL) TARGET=CIBLE.split('').map(Number);
else if(GOALMODE==='allume') TARGET=new Array(TOTAL).fill(1);
else TARGET=new Array(TOTAL).fill(0);
const REVEAL=P.get('reveal'),IMAGE=P.get('image'),VALIDATE=P.get('validate')==='1';
const TITLE=P.get('title'); if(TITLE)document.getElementById('title').textContent=TITLE;

let state=[];
function idx(r,c){return r*COLS+c;}
function toggle(i, record){ state[i]=state[i]?0:1; }
function press(i){
  const r=Math.floor(i/COLS), c=i%COLS;
  toggle(i);
  if(r>0) toggle(idx(r-1,c));
  if(r<ROWS-1) toggle(idx(r+1,c));
  if(c>0) toggle(idx(r,c-1));
  if(c<COLS-1) toggle(idx(r,c+1));
  render(); check();
}
// Génère un état de départ solvable : partir de la cible et appuyer aléatoirement
function genSolvable(){
  state=TARGET.slice();
  const moves=TOTAL+Math.floor(Math.random()*TOTAL);
  for(let m=0;m<moves;m++){ silentPress(Math.floor(Math.random()*TOTAL)); }
  // éviter de tomber pile sur la cible
  if(state.join('')===TARGET.join('')) silentPress(Math.floor(Math.random()*TOTAL));
}
function silentPress(i){
  const r=Math.floor(i/COLS), c=i%COLS;
  toggle(i);
  if(r>0) toggle(idx(r-1,c));
  if(r<ROWS-1) toggle(idx(r+1,c));
  if(c>0) toggle(idx(r,c-1));
  if(c<COLS-1) toggle(idx(r,c+1));
}
function init(){
  if(START.length===TOTAL) state=START.split('').map(Number);
  else genSolvable();
  document.getElementById('status').textContent='';
  document.getElementById('reveal-zone').innerHTML='';
  // libellé d'objectif
  const g=document.getElementById('goal');
  if(CIBLE.length===TOTAL) g.textContent='Atteignez la configuration demandée.';
  else g.textContent = GOALMODE==='allume' ? 'But : tout allumer.' : 'But : tout éteindre.';
  if(GOALMODE==='allume') document.getElementById('title').textContent = TITLE||'Allumez tous les voyants';
  render();
}
function render(){
  const grid=document.getElementById('grid');
  const size=Math.floor(Math.min(80, 300/COLS));
  grid.style.gridTemplateColumns='repeat('+COLS+','+size+'px)';
  let html='';
  for(let i=0;i<TOTAL;i++){
    html+=`<div class="cell ${state[i]?'on':''}" style="width:${size}px;height:${size}px" onclick="press(${i})"><span class="bulb">💡</span></div>`;
  }
  grid.innerHTML=html;
}
function check(){
  if(state.join('')!==TARGET.join('')) return;
  const st=document.getElementById('status'),zone=document.getElementById('reveal-zone');
  st.className='status ok'; st.textContent='✓ Réussi !';
  if(IMAGE){const g=document.createElement('img');g.src=IMAGE;g.className='reveal-img';zone.appendChild(g);}
  else if(REVEAL){const d=document.createElement('div');d.className='reveal';d.textContent=REVEAL;zone.appendChild(d);}
  if(VALIDATE){try{window.parent.postMessage({type:'ramscape:solved',module:'interrupteurs'},'*');}catch(e){}}
}
window.press=press;
document.getElementById('reset').onclick=init;
init();
</script></body></html>
