<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramscape — Roue de César</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:transparent;color:#eceef1;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:300px;margin:0 auto;padding:8px;text-align:center}
  .wheel-wrap{position:relative;width:240px;height:240px;margin:0 auto;touch-action:none}
  canvas{width:240px;height:240px;display:block;cursor:grab}
  canvas:active{cursor:grabbing}
</style>
</head>
<body>
<div class="wrap">
  <div class="wheel-wrap"><canvas id="wheel" width="480" height="480"></canvas></div>
</div>

<script>
const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let wheelShift = 0;
let displayShift = 0;
let animating = false;

const cv = document.getElementById('wheel');
const ctx = cv.getContext('2d');

const COL = {
  outerBg:'#3a3e45', outerText:'#eceef1',
  innerBg:'#23262b', innerText:'#cfd3d9',
  stroke:'#6b7079', mark:'#9aa0a8'
};

function drawWheel(shift){
  ctx.clearRect(0,0,480,480);
  const cx=240, cy=240;
  drawRing(cx, cy, 210, 168, shift, COL.outerBg, COL.outerText);
  drawRing(cx, cy, 158, 116, 0, COL.innerBg, COL.innerText);
}
function drawRing(cx, cy, rOut, rIn, shift, bg, fg){
  const rMid=(rOut+rIn)/2;
  ctx.beginPath(); ctx.arc(cx,cy,rOut,0,Math.PI*2); ctx.arc(cx,cy,rIn,0,Math.PI*2,true);
  ctx.fillStyle=bg; ctx.fill('evenodd');
  ctx.strokeStyle=COL.stroke; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,rOut,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,rIn,0,Math.PI*2); ctx.stroke();
  if (bg===COL.outerBg){
    ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
    for(let i=0;i<26;i++){
      const ang=((i+shift)/26)*Math.PI*2 - Math.PI/2 + Math.PI/26;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ang)*rIn, cy+Math.sin(ang)*rIn);
      ctx.lineTo(cx+Math.cos(ang)*rOut, cy+Math.sin(ang)*rOut);
      ctx.stroke();
    }
  }
  ctx.font='bold 20px Courier New, monospace'; ctx.fillStyle=fg; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<26;i++){
    const ang = ((i + shift) / 26) * Math.PI*2 - Math.PI/2;
    const x = cx + Math.cos(ang)*rMid, y = cy + Math.sin(ang)*rMid;
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang+Math.PI/2); ctx.fillText(A[i], 0, 0); ctx.restore();
  }
}
function update(){}

function animateTo(target){
  const start = displayShift;
  const diff = target - start;
  const startT = performance.now();
  const dur = 220;
  animating = true;
  function step(now){
    const t = Math.min(1, (now - startT) / dur);
    const ease = 1 - Math.pow(1 - t, 3);
    drawWheel(start + diff * ease);
    if (t < 1){ requestAnimationFrame(step); }
    else { displayShift = target; animating = false; drawWheel(target); }
  }
  requestAnimationFrame(step);
}


let dragging=false, lastAngle=0;
function angleFrom(ev){
  const r = cv.getBoundingClientRect();
  const x = (ev.touches?ev.touches[0].clientX:ev.clientX) - (r.left + r.width/2);
  const y = (ev.touches?ev.touches[0].clientY:ev.clientY) - (r.top + r.height/2);
  return Math.atan2(y,x);
}
function startDrag(ev){ dragging=true; lastAngle=angleFrom(ev); ev.preventDefault(); }
function moveDrag(ev){
  if(!dragging) return;
  const a = angleFrom(ev);
  let delta = a - lastAngle;
  if (delta > Math.PI) delta -= Math.PI*2;
  if (delta < -Math.PI) delta += Math.PI*2;
  lastAngle = a;
  displayShift += delta / (Math.PI*2/26);
  drawWheel(displayShift);
  wheelShift = Math.round(displayShift);
  update();
  ev.preventDefault();
}
function endDrag(){
  if(!dragging) return;
  dragging=false;
  animateTo(wheelShift);
}
cv.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', moveDrag); window.addEventListener('mouseup', endDrag);
cv.addEventListener('touchstart', startDrag, {passive:false}); cv.addEventListener('touchmove', moveDrag, {passive:false}); cv.addEventListener('touchend', endDrag);

drawWheel(0); update();
</script>
</body>
</html>
